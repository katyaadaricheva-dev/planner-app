    function renderWeekView() {
        showTasksHeader();
        const days = getWeekDays();
        const today = todayStr();
        const allTasks = state.tasks;

        // Группируем по дате
        const byDay = {};
        for (const t of allTasks) {
            if (t.date && inWeek(t.date)) {
                if (!byDay[t.date]) byDay[t.date] = [];
                byDay[t.date].push(t);
            }
        }

        let html = '<div class="week-view fade-in">';
        html += '<div class="week-title">Текущая неделя</div>';

        for (let i = 0; i < days.length; i++) {
            const d = days[i];
            const tasks = byDay[d.str] || [];
            const isToday = d.str === today;
            const dayName = DAY_FULL[d.date.getDay()];
            const dayNum = d.date.getDate();
            const mon = MONTH_GEN[d.date.getMonth()];
            const spanClass = (i === days.length - 1) ? ' span-full' : '';

            html += '<div class="day-card' + (isToday ? ' today-card' : '') + spanClass + '">';
            html += '<div class="day-card-header">';
            html += '<span class="dc-day">' + dayName + '</span>';
            html += '<span class="dc-date">' + dayNum + ' ' + mon + '</span>';
            if (isToday) html += '<span class="dc-badge today-badge">Сегодня</span>';
            else if (tasks.length > 0) html += '<span class="dc-badge">' + tasks.length + '</span>';
            html += '</div>';

            if (tasks.length === 0) {
                html += '<div class="day-empty-label">Нет задач</div>';
            } else {
                for (const t of tasks) {
                    html += '<div class="day-task-item' + (t.done ? ' done' : '') + '" data-id="' + t.id + '">';
                    html += '<div class="dt-check">';
                    html += '<input type="checkbox" id="dch_' + t.id + '"' + (t.done ? ' checked' : '') + '>';
                    html += '<label for="dch_' + t.id + '"></label></div>';
                    html += '<span class="dt-text">' + escape(t.text) + '</span>';
                    html += '<button class="dt-delete" data-id="' + t.id + '">&times;</button>';
                    html += '</div>';
                }
            }

            // Инлайн-ввод задачи для этого дня
            html += '<div class="day-inline-input">';
            html += '<input type="text" placeholder="Добавить задачу..." data-date="' + d.str + '">';
            html += '<button data-date="' + d.str + '">OK</button>';
            html += '</div>';

            html += '</div>'; // .day-card
        }

        html += '</div>'; // .week-view
        tasksCont.innerHTML = html;

        // Чекбоксы
        tasksCont.querySelectorAll('.day-task-item .dt-check input').forEach(cb => {
            cb.addEventListener('change', function() {
                const item = this.closest('.day-task-item');
                const id = Number(item.querySelector('.dt-delete').dataset.id);
                const task = state.tasks.find(t => t.id === id);
                if (task) { task.done = this.checked; item.classList.toggle('done', this.checked); save(); }
            });
        });

        // Удаление
        tasksCont.querySelectorAll('.dt-delete').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = Number(this.dataset.id);
                state.tasks = state.tasks.filter(t => t.id !== id);
                save(); renderWeekView();
            });
        });

        // Инлайн-ввод
        tasksCont.querySelectorAll('.day-inline-input').forEach(row => {
            const inp = row.querySelector('input');
            const btn = row.querySelector('button');
            const date = inp.dataset.date;

            function addInline() {
                const text = inp.value.trim();
                if (!text) return;
                state.tasks.push({ id: Date.now()+Math.floor(Math.random()*999), text, done: false, date });
                save();
                inp.value = '';
                renderWeekView();
            }

            btn.addEventListener('click', addInline);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') addInline(); });
        });
    }

    // ================================================================
    // ВИД: МЕСЯЦ — КАЛЕНДАРЬ + ЗАДАЧИ
    // ================================================================

    function renderMonthView() {
        showTasksHeader();
        const now = new Date();
        const year  = state.calYear  !== null ? state.calYear  : now.getFullYear();
        const month = state.calMonth !== null ? state.calMonth : now.getMonth();

        if (state.calYear === null)  state.calYear = year;
        if (state.calMonth === null) state.calMonth = month;

        const today = todayStr();
        const firstDay = new Date(year, month, 1).getDay();
        const startOff = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();

        const monthTasks = state.tasks.filter(t => t.date && inMonth(t.date, month, year));
        const byDay = {};
        for (const t of monthTasks) {
            if (!byDay[t.date]) byDay[t.date] = [];
            byDay[t.date].push(t);
        }

        let html = '<div class="month-view fade-in">';

        // Навигация
        html += '<div class="cal-nav">';
        html += '<button class="cal-nav-btn" id="calPrev">&larr;</button>';
        html += '<span class="cal-title">' + MONTH_NOM[month] + ' ' + year + '</span>';
        html += '<button class="cal-nav-btn" id="calNext">&rarr;</button>';
        html += '</div>';

        // Сетка
        html += '<div class="cal-grid">';
        for (const d of ['Пн','Вт','Ср','Чт','Пт','Сб','Вс']) html += '<div class="cal-header">'+d+'</div>';

        for (let i = 0; i < startOff; i++) {
            html += '<div class="cal-cell empty other-month">' + (prevDays - startOff + i + 1) + '</div>';
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
            const isToday = ds === today;
            const isSel = ds === state.calSelected;
            const hasTasks = byDay[ds] && byDay[ds].length > 0;
            const cls = 'cal-cell' + (isToday?' today':'') + (isSel?' selected':'');
            html += '<div class="'+cls+'" data-date="'+ds+'"><span>'+day+'</span>';
            if (hasTasks) html += '<span class="cal-dot"></span>';
            html += '</div>';
        }

        const total = startOff + daysInMonth;
        const rem = total % 7;
        if (rem > 0) {
            for (let i = 1; i <= 7 - rem; i++) html += '<div class="cal-cell empty other-month">'+i+'</div>';
        }
        html += '</div>';

        // Задачи выбранного дня
        const sel = state.calSelected || today;
        const selTasks = state.tasks.filter(t => t.date === sel);

        html += '<div class="cal-tasks">';
        html += '<div class="cal-tasks-title">' + fmtDateDisplay(sel) + '</div>';
        if (selTasks.length === 0) html += '<div class="cal-tasks-empty">Нет задач</div>';
        else {
            html += '<div class="cal-tasks-list">';
            for (const t of selTasks) {
                html += '<div class="cal-task-item'+(t.done?' done':'')+'">';
                html += '<div class="cal-task-check">';
                html += '<input type="checkbox" id="cch_'+t.id+'"'+(t.done?' checked':'')+'>';
                html += '<label for="cch_'+t.id+'"></label></div>';
                html += '<span class="task-text">'+escape(t.text)+'</span>';
                html += '<button class="cal-task-del" data-id="'+t.id+'">&times;</button>';
                html += '</div>';
            }
            html += '</div>';
        }
        html += '</div></div>';

        tasksCont.innerHTML = html;

        // Навигация
        document.getElementById('calPrev').addEventListener('click', () => {
            if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; }
            else state.calMonth--;
            state.calSelected = null;
            save(); renderHabitTracker(); renderMonthView();
        });
        document.getElementById('calNext').addEventListener('click', () => {
            if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; }
            else state.calMonth++;
            state.calSelected = null;
            save(); renderHabitTracker(); renderMonthView();
        });

        // Клик по дню
        tasksCont.querySelectorAll('.cal-cell:not(.empty)').forEach(cell => {
            cell.addEventListener('click', function() {
                state.calSelected = this.dataset.date;
                if (taskDate) taskDate.value = this.dataset.date;
                save(); renderMonthView();
            });
        });

        // Чекбоксы
        tasksCont.querySelectorAll('.cal-task-check input').forEach(cb => {
            cb.addEventListener('change', function() {
                const item = this.closest('.cal-task-item');
                const id = Number(item.querySelector('.cal-task-del').dataset.id);
                const task = state.tasks.find(t => t.id === id);
                if (task) { task.done = this.checked; item.classList.toggle('done', this.checked); save(); }
            });
        });
        tasksCont.querySelectorAll('.cal-task-del').forEach(btn => {
            btn.addEventListener('click', function() {
                state.tasks = state.tasks.filter(t => t.id !== Number(this.dataset.id));
                save(); renderMonthView();
            });
        });
    }

    // ================================================================
    // ВИД: ГОД — СТАТИСТИКА + ГЛОБАЛЬНЫЕ ЦЕЛИ
    // ================================================================

    function renderYearView() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();
        if (state.statsMonth === null) state.statsMonth = currentMonth;
        if (state.statsYear === null)  state.statsYear  = currentYear;
        const year  = state.statsYear;
        const month = state.statsMonth;

        // Скрыть шапку "Задачи" и поле ввода задач на этой вкладке
        const ts = document.getElementById('tasksSection');
        const th = ts ? ts.querySelector('.card-header') : null;
        const ti = ts ? ts.querySelector('.task-input-group') : null;
        if (th) th.style.display = 'none';
        if (ti) ti.style.display = 'none';

        // ---- Глобальные цели ----
        let goalsHtml = '';
        if (state.goals.length === 0) {
            goalsHtml = '<div class="tasks-empty fade-in" style="padding:16px 0;font-size:0.85rem;color:var(--text-muted);text-align:center">Нет глобальных целей</div>';
        } else {
            goalsHtml = '';
            for (const g of state.goals) {
                goalsHtml += '<div class="goal-card fade-in">';
                goalsHtml += '<div class="goal-header">';
                goalsHtml += '<span class="goal-title">'+escape(g.title)+'</span>';
                goalsHtml += '<button class="goal-edit-btn" data-id="'+g.id+'">&#9998;</button>';
                goalsHtml += '<button class="goal-del" data-id="'+g.id+'">&times;</button>';
                goalsHtml += '</div>';

                if (g.editing) {
                    // Режим редактирования названия
                    goalsHtml += '<div class="goal-step-input">';
                    goalsHtml += '<input type="text" class="goal-title-edit" value="'+escape(g.title)+'" placeholder="Новая цель" data-id="'+g.id+'">';
                    goalsHtml += '<button class="goal-title-save" data-id="'+g.id+'">Сохранить</button>';
                    goalsHtml += '</div>';
                }

                goalsHtml += '<div class="goal-steps">';
                if (g.steps && g.steps.length > 0) {
                    for (let si = 0; si < g.steps.length; si++) {
                        const s = g.steps[si];
                        goalsHtml += '<div class="goal-step'+(s.done?' done':'')+'" data-gid="'+g.id+'" data-si="'+si+'">';
                        goalsHtml += '<div class="gs-check">';
                        goalsHtml += '<input type="checkbox" id="gs_'+g.id+'_'+si+'"'+(s.done?' checked':'')+'>';
                        goalsHtml += '<label for="gs_'+g.id+'_'+si+'"></label></div>';
                        goalsHtml += '<span class="gs-text">'+escape(s.text)+'</span>';
                        goalsHtml += '<button class="gs-del" data-gid="'+g.id+'" data-si="'+si+'">&times;</button>';
                        goalsHtml += '</div>';
                    }
                }
                goalsHtml += '</div>'; // .goal-steps

                // Инлайн-ввод шага
                goalsHtml += '<div class="goal-step-input">';
                goalsHtml += '<input type="text" placeholder="Новый шаг..." data-gid="'+g.id+'">';
                goalsHtml += '<button data-gid="'+g.id+'">+</button>';
                goalsHtml += '</div>';

                goalsHtml += '</div>'; // .goal-card
            }
        }

        goalsHtml += '<button class="add-goal-btn" id="addGoalBtn">+ Новая глобальная цель</button>';

        // ---- Статистика привычек ----
        ensureHabits();
        let statsHtml = '';
        let bestStreak = 0;
        let curStreak = 0;

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const isFutureMonth = (year > currentYear) || (year === currentYear && month > currentMonth);
        const isCurMonth = (year === currentYear && month === currentMonth);
        const totalDays = isFutureMonth ? 0 : (isCurMonth ? now.getDate() : daysInMonth);

        if (!isFutureMonth) {
            for (const name of state.habitList) {
                const data = state.habits[name] || {};
                let done = 0;
                let streak = 0;
                let maxStreak = 0;
                let curStreakVal = 0;

                for (let d = 1; d <= totalDays; d++) {
                    const ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
                    if (data[ds]) {
                        done++;
                        streak++;
                        if (streak > maxStreak) maxStreak = streak;
                    } else {
                        streak = 0;
                    }
                }

                let checkDate = new Date(year, month, totalDays);
                while (true) {
                    const ds = fmtDate(checkDate);
                    if (data[ds]) { curStreakVal++; checkDate.setDate(checkDate.getDate() - 1); }
                    else break;
                    if (curStreakVal > 31) break;
                }

                const pct = totalDays > 0 ? Math.round((done / totalDays) * 100) : 0;
                if (maxStreak > bestStreak) bestStreak = maxStreak;
                if (curStreakVal > curStreak) curStreak = curStreakVal;

                statsHtml += '<div class="stat-row">';
                statsHtml += '<span class="stat-label">'+escape(name)+'</span>';
                statsHtml += '<div class="stat-bar-wrap"><div class="stat-bar-fill'+(state.theme==='monochrome'?' mono':'')+'" style="width:'+pct+'%"></div></div>';
                statsHtml += '<span class="stat-pct">'+pct+'%</span>';
                statsHtml += '</div>';
            }

            if (statsHtml) {
                statsHtml += '<div class="stat-meta">';
                statsHtml += '<span>Лучшая серия: <strong>'+bestStreak+'</strong> дн.</span>';
                statsHtml += '<span>Текущая серия: <strong>'+curStreak+'</strong> дн.</span>';
                statsHtml += '</div>';
            } else {
                statsHtml = '<div style="font-size:0.82rem;color:var(--text-muted);text-align:center;padding:8px 0">Нет данных для статистики</div>';
            }
        } else {
            statsHtml = '<div style="font-size:0.82rem;color:var(--text-muted);text-align:center;padding:8px 0">Статистика за этот месяц пока недоступна</div>';
        }

        const MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        let html = '<div class="year-view fade-in">';

        html += '<div class="card" style="margin:0">';
        html += '<div class="card-header"><h2>Глобальные цели</h2></div>';
        html += goalsHtml;
        html += '</div>';

        html += '<div class="card" style="margin:0">';
        html += '<div class="stat-nav">';
        html += '<button class="stat-nav-btn" id="statPrevMonth">&larr;</button>';
        html += '<span class="stat-nav-title">'+MONTH_NAMES[month]+' '+year+'</span>';
        html += '<button class="stat-nav-btn" id="statNextMonth">&rarr;</button>';
        html += '</div>';
        html += '<div class="stats-grid">'+statsHtml+'</div>';
        html += '</div>';

        html += '</div>';

        tasksCont.innerHTML = html;

        // ---- Обработчики целей ----

        // Удаление цели
        tasksCont.querySelectorAll('.goal-del').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = Number(this.dataset.id);
                state.goals = state.goals.filter(g => g.id !== id);
                save(); renderYearView();
            });
        });

        // Редактирование названия цели (включить режим)
        tasksCont.querySelectorAll('.goal-edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = Number(this.dataset.id);
                const g = state.goals.find(g => g.id === id);
                if (g) { g.editing = true; save(); renderYearView(); }
            });
        });

        // Сохранение названия цели
        tasksCont.querySelectorAll('.goal-title-save').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = Number(this.dataset.id);
                const inp = document.querySelector('.goal-title-edit[data-id="'+id+'"]');
                if (inp) {
                    const g = state.goals.find(g => g.id === id);
                    if (g) { g.title = inp.value.trim() || g.title; g.editing = false; save(); renderYearView(); }
                }
            });
        });
        tasksCont.querySelectorAll('.goal-title-edit').forEach(inp => {
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const id = Number(this.dataset.id);
                    const g = state.goals.find(g => g.id === id);
                    if (g) { g.title = this.value.trim() || g.title; g.editing = false; save(); renderYearView(); }
                }
            });
        });

        // Чекбоксы шагов
        tasksCont.querySelectorAll('.goal-step .gs-check input').forEach(cb => {
            cb.addEventListener('change', function() {
                const step = this.closest('.goal-step');
                const gid = Number(step.dataset.gid);
                const si = Number(step.dataset.si);
                const g = state.goals.find(g => g.id === gid);
                if (g && g.steps[si]) { g.steps[si].done = this.checked; step.classList.toggle('done', this.checked); save(); }
            });
        });

        // Удаление шага
        tasksCont.querySelectorAll('.gs-del').forEach(btn => {
            btn.addEventListener('click', function() {
                const gid = Number(this.dataset.gid);
                const si = Number(this.dataset.si);
                const g = state.goals.find(g => g.id === gid);
                if (g && g.steps[si]) { g.steps.splice(si, 1); save(); renderYearView(); }
            });
        });

        // Добавление шага
        tasksCont.querySelectorAll('.goal-step-input').forEach(row => {
            const inp = row.querySelector('input[data-gid]');
            const btn = row.querySelector('button[data-gid]');
            if (!inp || !btn) return;
            const gid = Number(inp.dataset.gid);

            function addStep() {
                const text = inp.value.trim();
                if (!text) return;
                const g = state.goals.find(g => g.id === gid);
                if (g) {
                    if (!g.steps) g.steps = [];
                    g.steps.push({ text, done: false });
                    save(); renderYearView();
                }
            }

            btn.addEventListener('click', addStep);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') addStep(); });
        });

        // Добавление новой цели
        document.getElementById('addGoalBtn')?.addEventListener('click', () => {
            state.goals.push({
                id: Date.now() + Math.floor(Math.random()*9999),
                title: '',
                steps: [],
                editing: true
            });
            save(); renderYearView();
            // Фокус на поле ввода названия
            setTimeout(() => {
                const inp = document.querySelector('.goal-title-edit');
                if (inp) { inp.focus(); inp.select(); }
            }, 100);
        });

        // Навигация по месяцам статистики
        document.getElementById('statPrevMonth')?.addEventListener('click', () => {
            if (state.statsMonth === 0) { state.statsMonth = 11; state.statsYear--; }
            else state.statsMonth--;
            save(); renderYearView();
        });
        document.getElementById('statNextMonth')?.addEventListener('click', () => {
            if (state.statsMonth === 11) { state.statsMonth = 0; state.statsYear++; }
            else state.statsMonth++;
            save(); renderYearView();
        });
    }

    // ================================================================
    // ОБЩИЙ РЕНДЕР
    // ================================================================

    function renderCurrentView() {
        if (state.period === 'week')  return renderWeekView();
        if (state.period === 'month') return renderMonthView();
        if (state.period === 'year')  return renderYearView();
        renderWeekView();
    }

    // ================================================================
    // ДОБАВЛЕНИЕ ЗАДАЧИ
    // ================================================================

    function addTask() {
        const text = taskInput.value.trim();
        if (!text) { taskInput.focus(); return; }
        const date = taskDate.value || todayStr();
        state.tasks.push({ id: Date.now()+Math.floor(Math.random()*999), text, done: false, date });
        save();
        taskInput.value = '';
        taskInput.focus();
        renderCurrentView();
    }

    // ================================================================
    // ПЕРИОДЫ
    // ================================================================

    function setPeriod(period) {
        state.period = period;
        if (period !== 'month') { state.calMonth = null; state.calYear = null; state.calSelected = null; }
        if (period !== 'year') { state.statsMonth = null; state.statsYear = null; }
        save();
        periodTabs.forEach(t => t.classList.toggle('active', t.dataset.period === period));
        renderHabitTracker();
        renderCurrentView();
    }

    // ================================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ================================================================

    function init() {
        loadLocal();
        applyTheme(state.theme);
        taskDate.value = todayStr();
        renderGreeting();
        renderHabitTracker();
        periodTabs.forEach(t => t.classList.toggle('active', t.dataset.period === state.period));
        renderCurrentView();
        // PWA: манифест + service worker
        setupPWA();
        // Firebase и вход
        initFirebase();

        // Заметки
        const notesInput = $('#notesInput');
        notesInput.value = state.notes;
        notesInput.addEventListener('input', function() {
            state.notes = this.value;
            save();
        });

        // Тема
        themeBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePopup(!themePopup.classList.contains('open')); });
        $$('.theme-option').forEach(el => el.addEventListener('click', () => { applyTheme(el.dataset.theme); togglePopup(false); }));
        document.addEventListener('click', () => togglePopup(false));
        themePopup.addEventListener('click', (e) => e.stopPropagation());

        // Периоды
        periodTabs.forEach(t => t.addEventListener('click', () => setPeriod(t.dataset.period)));

        // Добавление задачи
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

        // Редактирование привычек
        editHabitsBtn.addEventListener('click', openHabitModal);
        modalSave.addEventListener('click', saveHabitModal);
        modalCancel.addEventListener('click', closeHabitModal);
        modalAddHabit.addEventListener('click', () => {
            editModalList.push('Новая привычка');
            renderModalList();
            // Фокус на последнем инпуте
            setTimeout(() => {
                const inputs = modalHabitList.querySelectorAll('.mh-name-input');
                if (inputs.length > 0) { inputs[inputs.length-1].focus(); inputs[inputs.length-1].select(); }
            }, 50);
        });
        // Закрытие по клику вне модала
        habitModal.addEventListener('click', (e) => { if (e.target === habitModal) closeHabitModal(); });

        // Обработчики входа
        setupLoginHandlers();

        // Обновление приветствия
        setInterval(renderGreeting, 60000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
